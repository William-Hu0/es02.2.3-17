<div class="container">
  <h1>🌟 Pokédex - Tipi Pokémon</h1>

  <div class="card">
    <button type="button" class="btn" (click)="RequestType()">
      <span class="loading" *ngIf="loading"></span>
      Mostra Tipi Pokémon
    </button>

    @if (loading) {
      <div class="loading-container">
        <div class="loading-text">
          <div class="spinner"></div>
          Caricamento tipi Pokémon...
        </div>
      </div>
    }

    @if (data != null && data.results) {
      <div class="pokemon-list-container">
        @for (pokemon of data.results; track pokemon.name) {
          <div class="pokemon-type-card">
            <h3 class="pokemon-type-name">{{ pokemon.name }}</h3>
            <a class="pokemon-type-link" [routerLink]="['/nomi-pokemon', pokemon.name]">
              Vedi Pokémon di questo tipo →
            </a>
          </div>
        }
      </div>
    }
  </div>
</div>
